<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stationery Hollistic Platform</title>
    
    <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'paper': '#F9F8F6',
                        'sunflower': '#FFD700',
                        'tech-blue': '#1E3A8A',
                        'partner-blue': '#93C5FD'
                    },
                    fontFamily: { 'nunito': ['Nunito', 'sans-serif'] },
                    boxShadow: {
                        'brutal': '6px 6px 0px 0px #1E3A8A',
                        'brutal-sm': '3px 3px 0px 0px #1E3A8A',
                        'brutal-active': '1px 1px 0px 0px #1E3A8A',
                    },
                    borderWidth: { '3': '3px' }
                }
            }
        }
    </script>

    <style>
        body {
            font-family: 'Nunito', sans-serif;
            background-color: #F9F8F6;
            color: #1E3A8A;
            margin: 0;
            overflow-x: hidden;
        }
        .dot-grid {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background-image: radial-gradient(rgba(30, 58, 138, 0.15) 1.5px, transparent 1.5px);
            background-size: 24px 24px; z-index: -1; pointer-events: none;
        }
        .brutal-btn { transition: all 0.1s cubic-bezier(0.4, 0, 0.2, 1); cursor: pointer; }
        .brutal-btn:active { transform: translate(3px, 3px); box-shadow: 1px 1px 0px 0px #1E3A8A; }
        .notebook-textarea {
            background-color: transparent;
            background-image: repeating-linear-gradient(transparent, transparent 31px, rgba(30, 58, 138, 0.2) 32px);
            line-height: 32px; padding-top: 6px; border: none; resize: vertical; outline: none;
            font-family: 'Nunito', sans-serif; font-weight: 600; color: #1E3A8A; width: 100%;
        }
        textarea.notebook-textarea { min-height: 150px; }
        input[type=range] { -webkit-appearance: none; width: 100%; background: transparent; }
        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none; height: 20px; width: 20px; border-radius: 50%;
            background: #FFD700; cursor: pointer; border: 3px solid #1E3A8A; margin-top: -8px; box-shadow: 2px 2px 0px 0px #1E3A8A;
        }
        input[type=range].partner-slider::-webkit-slider-thumb { background: #93C5FD; }
        input[type=range]::-webkit-slider-runnable-track { width: 100%; height: 6px; cursor: pointer; background: rgba(30, 58, 138, 0.1); border-radius: 3px; border: 1px solid #1E3A8A; }
        .monoline-checkbox {
            width: 24px; height: 24px; border: 3px solid #1E3A8A; border-radius: 6px; display: flex; align-items: center; justify-content: center;
            cursor: pointer; background: #fff; transition: all 0.1s ease-in-out; box-shadow: 2px 2px 0px 0px #1E3A8A;
        }
        .monoline-checkbox.checked { background: #FFD700; box-shadow: 1px 1px 0px 0px #1E3A8A; transform: translate(1px, 1px); }
        .monoline-checkbox.checked::after { content: "X"; color: #1E3A8A; font-weight: 900; font-size: 16px; line-height: 1; }
        
        .polaroid {
            background: white; padding: 12px 12px 40px 12px; border: 3px solid #1E3A8A;
            box-shadow: 6px 6px 0px 0px #1E3A8A; transform: rotate(calc(-3deg + 6deg * var(--rand)));
            transition: transform 0.2s; cursor: pointer;
        }
        .polaroid:hover { transform: scale(1.05) rotate(0deg); z-index: 10; }
        .polaroid img { width: 100%; height: 200px; object-fit: cover; border: 3px solid #1E3A8A; }

        @keyframes flyAirplane { 0% { transform: translate(0, 0) rotate(0deg) scale(1); opacity: 1; } 50% { transform: translate(150px, -100px) rotate(15deg) scale(1.2); opacity: 1; } 100% { transform: translate(300px, -200px) rotate(30deg) scale(0.5); opacity: 0; } }
        .fly-animation { animation: flyAirplane 1.5s ease-out forwards; }
        @keyframes sweatDrop { 0% { transform: translateY(0) scale(0); opacity: 0; } 50% { transform: translateY(10px) scale(1); opacity: 1; } 100% { transform: translateY(20px) scale(0.5); opacity: 0; } }
        .sweat-animation { animation: sweatDrop 1s ease-in forwards; }
        @keyframes burstStar { 0% { transform: scale(0) rotate(0deg); opacity: 1; } 50% { transform: scale(1.5) rotate(45deg); opacity: 1; } 100% { transform: scale(2) rotate(90deg); opacity: 0; } }
        .burst-animation { animation: burstStar 0.5s ease-out forwards; }
        @keyframes shootConfetti { 0% { transform: translateY(0) scale(1) rotate(0deg); opacity: 1; } 100% { transform: translate(var(--tx), var(--ty)) scale(0.5) rotate(720deg); opacity: 0; } }
        .confetti-particle { animation: shootConfetti 1.2s ease-out forwards; }
    </style>
</head>
<body>
    <div class="dot-grid"></div>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const CATEGORIES = ['Finances', 'Career & Projects', 'Health & Wellness', 'Spirituality', 'Personal Growth', 'Romance'];

        // --- UTILS ---
        const polarToCartesian = (centerX, centerY, radius, angleInDegrees) => {
            const angleInRadians = (angleInDegrees - 90) * Math.PI / 180.0;
            return { x: centerX + (radius * Math.cos(angleInRadians)), y: centerY + (radius * Math.sin(angleInRadians)) };
        };

        // --- COMPONENTS ---
        const RadarChart = ({ userScores, partnerScores }) => {
            const size = 300; const center = size / 2; const maxRadius = 100; const angleStep = 360 / CATEGORIES.length;
            const getPoints = (scores) => scores.map((s, i) => `${polarToCartesian(center, center, (s/10)*maxRadius, i*angleStep).x},${polarToCartesian(center, center, (s/10)*maxRadius, i*angleStep).y}`).join(' ');
            
            const gridRings = [0.2, 0.4, 0.6, 0.8, 1].map((scale, index) => (
                <polygon key={index} points={Array.from({length: CATEGORIES.length}).map((_, i) => `${polarToCartesian(center, center, maxRadius*scale, i*angleStep).x},${polarToCartesian(center, center, maxRadius*scale, i*angleStep).y}`).join(' ')} fill="none" stroke="#1E3A8A" strokeWidth={scale===1?"3":"1"} strokeDasharray={scale===1?"none":"4 4"} className="opacity-50" />
            ));

            return (
                <div className="relative w-full max-w-sm mx-auto p-4 bg-white border-3 border-tech-blue rounded-3xl shadow-brutal">
                    <svg viewBox={`0 0 ${size} ${size}`} className="w-full h-auto overflow-visible">
                        {gridRings}
                        {CATEGORIES.map((cat, i) => {
                            const outer = polarToCartesian(center, center, maxRadius, i * angleStep);
                            const labelPos = polarToCartesian(center, center, maxRadius + 25, i * angleStep);
                            return (
                                <g key={i}>
                                    <line x1={center} y1={center} x2={outer.x} y2={outer.y} stroke="#1E3A8A" strokeWidth="2" strokeDasharray="4 4" className="opacity-40" />
                                    <text x={labelPos.x} y={labelPos.y} textAnchor="middle" alignmentBaseline="middle" className="text-xs font-bold fill-tech-blue">{cat}</text>
                                </g>
                            );
                        })}
                        <polygon points={getPoints(partnerScores)} fill="rgba(147, 197, 253, 0.6)" stroke="#1E3A8A" strokeWidth="3" strokeLinejoin="round" />
                        <polygon points={getPoints(userScores)} fill="rgba(255, 215, 0, 0.7)" stroke="#1E3A8A" strokeWidth="3" strokeLinejoin="round" />
                    </svg>
                </div>
            );
        };

        const ConfettiOverlay = () => (
            <div className="absolute inset-0 overflow-hidden rounded-3xl pointer-events-none z-50 flex items-end justify-center pb-10">
                {Array.from({length: 15}).map((_, i) => (
                    <div key={i} className="absolute w-4 h-4 confetti-particle border-2 border-tech-blue" style={{ backgroundColor: i%2===0?'#FFD700':'#93C5FD', left: '50%', bottom: '20px', animationDelay: `${Math.random()*0.1}s`, '--tx': `${-100+Math.random()*200}px`, '--ty': `${-150-Math.random()*150}px`, borderRadius: Math.random()>0.5?'50%':'0' }}></div>
                ))}
            </div>
        );

        const GoalCard = ({ goal, onToggleMini, onAddMini }) => {
            const [newMiniText, setNewMiniText] = useState("");
            const [animatingMiniId, setAnimatingMiniId] = useState(null);
            const [showConfetti, setShowConfetti] = useState(false);
            const completedCount = goal.miniGoals.filter(m => m.completed).length;
            const progress = goal.miniGoals.length === 0 ? 0 : (completedCount / goal.miniGoals.length) * 100;

            const handleToggle = (miniId, wasCompleted) => {
                onToggleMini(goal.id, miniId);
                if (!wasCompleted) {
                    setAnimatingMiniId(miniId); setTimeout(() => setAnimatingMiniId(null), 500);
                    if (completedCount + 1 === goal.miniGoals.length && goal.miniGoals.length > 0) {
                        setShowConfetti(true); setTimeout(() => setShowConfetti(false), 2000);
                    }
                }
            };
            return (
                <div className="bg-white border-3 border-tech-blue p-5 rounded-3xl shadow-brutal relative flex flex-col gap-4">
                    {showConfetti && <ConfettiOverlay />}
                    <div className="flex justify-between items-start"><span className="text-xs font-black uppercase tracking-widest bg-sunflower border-2 border-tech-blue px-3 py-1 rounded-full shadow-brutal-active">{goal.category}</span></div>
                    <h3 className="text-xl font-extrabold">{goal.title}</h3>
                    <div className="w-full h-4 rounded-full border-3 border-tech-blue overflow-hidden bg-paper"><div className="h-full bg-tech-blue transition-all duration-500 ease-out" style={{width: `${progress}%`}}></div></div>
                    <div className="flex flex-col gap-3 mt-2">
                        {goal.miniGoals.map(mini => (
                            <div key={mini.id} className="flex items-center gap-3 relative">
                                {animatingMiniId === mini.id && <div className="absolute -left-3 text-2xl burst-animation pointer-events-none z-10">✨</div>}
                                <button className={`monoline-checkbox shrink-0 ${mini.completed ? 'checked' : ''}`} onClick={() => handleToggle(mini.id, mini.completed)}></button>
                                <span className={`font-bold leading-tight ${mini.completed ? 'line-through opacity-50' : ''}`}>{mini.text}</span>
                            </div>
                        ))}
                    </div>
                    <input type="text" placeholder="+ Add mini-goal (Press Enter)..." className="notebook-textarea min-h-0 h-10 mt-2 px-1 text-sm bg-transparent" value={newMiniText} onChange={e => setNewMiniText(e.target.value)} onKeyDown={e => { if(e.key==='Enter' && newMiniText.trim()){ onAddMini(goal.id, newMiniText); setNewMiniText(""); } }} />
                </div>
            );
        };

        const Sidebar = ({ activePage, setActivePage, isMobileMenuOpen, setIsMobileMenuOpen }) => {
            const navItems = [
                { id: 'dashboard', icon: '📊', label: 'Dashboard' },
                { id: 'wheel', icon: '🎡', label: 'Holistic Wheel' },
                { id: 'mood', icon: '😊', label: 'Mood Space' },
                { id: 'journal', icon: '📸', label: 'Memory Journal' },
                { id: 'goals', icon: '✅', label: 'Goal Tracker' },
                { id: 'soundtrack', icon: '🎵', label: 'Soundtrack' },
                { id: 'wellness', icon: '💖', label: 'Wellness & Focus' },
                { id: 'growth', icon: '📈', label: 'Growth Arc' }
            ];
            return (
                <aside className={`w-64 fixed top-0 left-0 h-screen bg-white border-r-3 border-tech-blue p-6 flex flex-col gap-4 z-50 overflow-y-auto transition-transform duration-300 ${isMobileMenuOpen ? 'translate-x-0' : '-translate-x-full md:translate-x-0'}`}>
                    <div className="flex items-center gap-3 border-b-3 border-tech-blue pb-6 mt-4 mb-4">
                        <div className="w-10 h-10 bg-sunflower border-3 border-tech-blue rounded-lg shadow-brutal-active flex items-center justify-center shrink-0 text-xl">☀️</div>
                        <h1 className="font-black text-2xl tracking-widest">LUMINA</h1>
                    </div>
                    <nav className="flex flex-col gap-3">
                        {navItems.map(item => (
                            <button key={item.id} onClick={() => { setActivePage(item.id); setIsMobileMenuOpen(false); }} className={`brutal-btn flex items-center gap-3 p-3 rounded-xl border-3 border-tech-blue font-bold transition-all text-left ${activePage === item.id ? 'bg-sunflower shadow-brutal-sm translate-x-1' : 'bg-paper hover:bg-yellow-50'}`}>
                                <span className="w-5 h-5 flex items-center justify-center shrink-0 text-lg">{item.icon}</span>{item.label}
                            </button>
                        ))}
                    </nav>
                </aside>
            );
        };

        const App = () => {
            const [activePage, setActivePage] = useState('dashboard');
            const [isMobileMenuOpen, setIsMobileMenuOpen] = useState(false);
            const [isAnimating, setIsAnimating] = useState(false);
            
            // App Data State
            const [userScores, setUserScores] = useState([7, 6, 8, 5, 7, 9]);
            const [partnerScores, setPartnerScores] = useState([6, 8, 7, 4, 8, 9]);
            
            const [moods, setMoods] = useState([{ mood: 'Happy', emoji: '😊', note: 'Feeling great about our progress!', date: 'Today, 9:00 AM' }]);
            const [newMoodNote, setNewMoodNote] = useState('');
            
            const [memories, setMemories] = useState([{ id: 1, url: 'https://images.unsplash.com/photo-1516589178581-6cd7833ae3b2?ixlib=rb-4.0.3&auto=format&fit=crop&w=800&q=80', caption: 'Coffee in Montmartre.', date: 'Oct 12' }]);
            const [newMemoryUrl, setNewMemoryUrl] = useState('');
            const [newMemoryCap, setNewMemoryCap] = useState('');
            const [selectedMemory, setSelectedMemory] = useState(null);

            const [macroGoals, setMacroGoals] = useState([
                { id: 1, title: "Plan Anniversary Trip", category: "Romance", miniGoals: [ {id: 101, text: "Book flights to Kyoto", completed: false}, {id: 102, text: "Reserve ryokan", completed: true} ] },
                { id: 2, title: "Build Emergency Fund", category: "Finances", miniGoals: [ {id: 201, text: "Save first $1000", completed: true}, {id: 202, text: "Automate transfers", completed: false} ] }
            ]);

            const [isSpotifyConnected, setIsSpotifyConnected] = useState(false);

            // Removed lucide init to prevent React crashes

            // Handlers
            const addMood = (mood, emoji) => {
                setMoods([{ mood, emoji, note: newMoodNote, date: 'Just now' }, ...moods]);
                setNewMoodNote('');
            };

            const addMemory = () => {
                if(newMemoryUrl) {
                    setMemories([{ id: Date.now(), url: newMemoryUrl, caption: newMemoryCap || 'A new memory', date: 'Just now' }, ...memories]);
                    setNewMemoryUrl(''); setNewMemoryCap('');
                }
            };

            const combinedScores = userScores.map((s, i) => s + partnerScores[i]);
            const focusCategory = CATEGORIES[combinedScores.indexOf(Math.min(...combinedScores))];

            return (
                <div className="min-h-screen md:pl-64 relative pb-20 pt-20 md:pt-0">
                    {/* Mobile Header */}
                    <div className="md:hidden fixed top-0 left-0 w-full bg-white border-b-3 border-tech-blue p-4 z-40 flex justify-between items-center shadow-brutal-sm">
                        <div className="flex items-center gap-2">
                            <div className="w-8 h-8 bg-sunflower border-2 border-tech-blue rounded flex items-center justify-center shrink-0 text-lg">☀️</div>
                            <h1 className="font-black text-xl tracking-widest">LUMINA</h1>
                        </div>
                        <button onClick={() => setIsMobileMenuOpen(!isMobileMenuOpen)} className="brutal-btn p-2 border-2 border-tech-blue bg-paper rounded-lg w-10 h-10 flex items-center justify-center text-xl">
                            {isMobileMenuOpen ? "❌" : "☰"}
                        </button>
                    </div>

                    {/* Mobile Menu Overlay */}
                    {isMobileMenuOpen && <div className="fixed inset-0 bg-tech-blue/50 z-40 md:hidden backdrop-blur-sm" onClick={() => setIsMobileMenuOpen(false)}></div>}

                    <Sidebar activePage={activePage} setActivePage={setActivePage} isMobileMenuOpen={isMobileMenuOpen} setIsMobileMenuOpen={setIsMobileMenuOpen} />
                    
                    {/* Memory Detail Modal Overlay */}
                    {selectedMemory && (
                        <div className="fixed inset-0 bg-tech-blue/80 z-[100] flex items-center justify-center p-4 backdrop-blur-sm" onClick={() => setSelectedMemory(null)}>
                            <div className="bg-white border-3 border-tech-blue p-6 rounded-3xl shadow-brutal max-w-2xl w-full" onClick={e => e.stopPropagation()}>
                                <img src={selectedMemory.url} className="w-full h-[400px] object-cover border-3 border-tech-blue rounded-xl mb-6"/>
                                <h3 className="font-black text-3xl mb-2">{selectedMemory.caption}</h3>
                                <p className="font-bold opacity-50 uppercase tracking-widest">{selectedMemory.date}</p>
                                <button className="brutal-btn bg-sunflower border-3 border-tech-blue p-4 mt-8 rounded-xl w-full font-black text-lg" onClick={() => setSelectedMemory(null)}>Close Memory</button>
                            </div>
                        </div>
                    )}

                    <div className="max-w-6xl mx-auto p-4 md:p-8">
                        {/* Header */}
                        <header className="flex flex-col md:flex-row justify-between items-center gap-4 mb-8 bg-white border-3 border-tech-blue p-4 rounded-2xl shadow-brutal">
                            <div className="flex items-center gap-3 w-full md:w-auto">
                                <div className="w-12 h-12 rounded-full bg-sunflower border-3 border-tech-blue flex items-center justify-center shadow-brutal-sm text-2xl">🌻</div>
                                <div><h2 className="font-extrabold text-xl leading-tight">Your Journey</h2><p className="text-xs font-bold opacity-70">Chapter 4</p></div>
                            </div>
                            <h1 className="font-black text-2xl tracking-widest uppercase hidden md:block">
                                {activePage === 'wheel' ? 'HOLISTIC WHEEL' : activePage.replace('-', ' ')}
                            </h1>
                            <div className="flex items-center gap-3 text-right w-full md:w-auto justify-end">
                                <div><h2 className="font-extrabold text-xl leading-tight">Partner</h2><p className="text-xs font-bold opacity-70">Sync: 85%</p></div>
                                <div className="w-12 h-12 rounded-full bg-partner-blue border-3 border-tech-blue flex items-center justify-center shadow-brutal-sm text-2xl relative">
                                    🎧{isAnimating && <div className="absolute -top-4 -right-2 text-xl sweat-animation">💦</div>}
                                </div>
                            </div>
                        </header>

                        {/* PAGE: DASHBOARD */}
                        {activePage === 'dashboard' && (
                            <div className="grid grid-cols-1 lg:grid-cols-2 gap-8 mb-16">
                                <div className="bg-white border-3 border-tech-blue p-8 rounded-3xl shadow-brutal flex flex-col gap-6">
                                    <h2 className="font-black text-2xl border-b-3 border-tech-blue pb-4">Today's Summary</h2>
                                    <div className="flex items-center gap-4">
                                        <div className="w-16 h-16 rounded-full bg-sunflower border-3 border-tech-blue flex items-center justify-center text-3xl">{moods[0]?.emoji || '✨'}</div>
                                        <div><h3 className="font-bold text-lg">Your Mood: {moods[0]?.mood || 'Not logged'}</h3><p className="opacity-70 font-bold">"{moods[0]?.note || 'No notes yet'}"</p></div>
                                    </div>
                                    <div className="flex items-center gap-4 mt-4">
                                        <div className="w-16 h-16 rounded-full bg-partner-blue border-3 border-tech-blue flex items-center justify-center text-3xl">🎧</div>
                                        <div><h3 className="font-bold text-lg">Partner Status</h3><p className="opacity-70 font-bold">Listening to Coldplay, 300 miles away.</p></div>
                                    </div>
                                </div>
                                <div className="bg-white border-3 border-tech-blue p-8 rounded-3xl shadow-brutal flex flex-col gap-6">
                                    <h2 className="font-black text-2xl border-b-3 border-tech-blue pb-4">Quick Actions</h2>
                                    <div className="grid grid-cols-2 gap-4 h-full">
                                        <button className="brutal-btn bg-sunflower border-3 border-tech-blue rounded-xl font-bold flex flex-col items-center justify-center p-4" onClick={() => setActivePage('mood')}><span className="text-3xl mb-2">😊</span> Log Mood</button>
                                        <button className="brutal-btn bg-partner-blue border-3 border-tech-blue rounded-xl font-bold flex flex-col items-center justify-center p-4" onClick={() => setActivePage('journal')}><span className="text-3xl mb-2">📸</span> Add Memory</button>
                                        <button className="brutal-btn bg-white border-3 border-tech-blue rounded-xl font-bold flex flex-col items-center justify-center p-4" onClick={() => setActivePage('goals')}><span className="text-3xl mb-2">✅</span> View Goals</button>
                                        <button className="brutal-btn bg-white border-3 border-tech-blue rounded-xl font-bold flex flex-col items-center justify-center p-4" onClick={() => { setIsAnimating(true); setTimeout(() => setIsAnimating(false), 1500); }}><span className="text-3xl mb-2">⚡</span> Send Ping</button>
                                    </div>
                                </div>
                            </div>
                        )}

                        {/* PAGE: WHEEL */}
                        {activePage === 'wheel' && (
                            <div className="grid grid-cols-1 lg:grid-cols-12 gap-8 mb-16">
                                <div className="lg:col-span-4 bg-white border-3 border-tech-blue p-6 rounded-3xl shadow-brutal flex flex-col gap-6">
                                    <div className="flex items-center gap-2 mb-2"><span className="text-xl">🎚️</span><h2 className="font-extrabold text-xl">Adjust Balance</h2></div>
                                    <div className="overflow-y-auto pr-2" style={{maxHeight: '500px'}}>
                                        {CATEGORIES.map((cat, i) => (
                                            <div key={i} className="mb-6 pb-6 border-b-2 border-tech-blue border-dashed last:border-0 last:pb-0">
                                                <h3 className="font-bold text-sm mb-3">{cat}</h3>
                                                <div className="flex items-center gap-4 mb-3">
                                                    <div className="w-8 h-8 rounded-full bg-sunflower border-2 border-tech-blue flex items-center justify-center font-bold text-xs shadow-brutal-active shrink-0">{userScores[i]}</div>
                                                    <input type="range" min="1" max="10" value={userScores[i]} onChange={e => { const newScores = [...userScores]; newScores[i] = parseInt(e.target.value); setUserScores(newScores); }} />
                                                </div>
                                                <div className="flex items-center gap-4">
                                                    <div className="w-8 h-8 rounded-full bg-partner-blue border-2 border-tech-blue flex items-center justify-center font-bold text-xs shadow-brutal-active shrink-0">{partnerScores[i]}</div>
                                                    <input type="range" min="1" max="10" className="partner-slider" value={partnerScores[i]} onChange={e => { const newScores = [...partnerScores]; newScores[i] = parseInt(e.target.value); setPartnerScores(newScores); }} />
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                </div>

                                <div className="lg:col-span-8 flex flex-col gap-8">
                                    <RadarChart userScores={userScores} partnerScores={partnerScores} />
                                    <div className="relative">
                                        {isAnimating && <div className="absolute top-1/2 left-1/2 z-50 text-4xl fly-animation pointer-events-none">✈️</div>}
                                        <button onClick={() => { setIsAnimating(true); setTimeout(() => setIsAnimating(false), 1500); }} className="brutal-btn w-full bg-sunflower border-3 border-tech-blue rounded-2xl shadow-brutal p-6 flex flex-col items-center justify-center text-center relative overflow-hidden">
                                            <span className="text-sm font-extrabold uppercase tracking-widest opacity-80 mb-1">Recommended Action</span>
                                            <h3 className="text-2xl font-black">Plan a {focusCategory} Activity</h3>
                                        </button>
                                    </div>
                                    <div className="bg-white border-3 border-tech-blue rounded-3xl shadow-brutal overflow-hidden">
                                        <div className="border-b-3 border-tech-blue p-4 bg-paper flex items-center gap-2"><span className="text-xl">📖</span><h2 className="font-extrabold text-lg">The Crucible (Reflections)</h2></div>
                                        <div className="grid grid-cols-1 md:grid-cols-2 divide-y-3 md:divide-y-0 md:divide-x-3 divide-tech-blue">
                                            <div className="p-6 bg-yellow-50/30">
                                                <div className="flex items-center gap-2 mb-4"><div className="w-6 h-6 rounded-full bg-sunflower border-2 border-tech-blue"></div><span className="font-bold">Your Notes</span></div>
                                                <textarea className="notebook-textarea" placeholder="Write your reflections here..." defaultValue="I think we should focus more on saving for our next trip to Tokyo."></textarea>
                                            </div>
                                            <div className="p-6 bg-blue-50/30">
                                                <div className="flex items-center gap-2 mb-4"><div className="w-6 h-6 rounded-full bg-partner-blue border-2 border-tech-blue"></div><span className="font-bold">Partner's Notes</span></div>
                                                <textarea className="notebook-textarea" placeholder="Partner's reflections..." defaultValue="Agreed! Though I'm feeling a bit burnt out with work."></textarea>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        )}

                        {/* PAGE: GOALS */}
                        {activePage === 'goals' && (
                            <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
                                {macroGoals.map(goal => (
                                    <GoalCard key={goal.id} goal={goal} 
                                        onToggleMini={(mId, miId) => { setMacroGoals(prev => prev.map(g => g.id === mId ? {...g, miniGoals: g.miniGoals.map(m => m.id === miId ? {...m, completed: !m.completed} : m)} : g)); }} 
                                        onAddMini={(mId, text) => { setMacroGoals(prev => prev.map(g => g.id === mId ? {...g, miniGoals: [...g.miniGoals, {id: Date.now(), text, completed: false}]} : g)); }} 
                                    />
                                ))}
                                <button className="brutal-btn bg-paper border-3 border-tech-blue border-dashed p-5 rounded-3xl shadow-brutal flex flex-col items-center justify-center min-h-[200px]" onClick={() => { const title = prompt("New Macro Goal:"); if(title) setMacroGoals([...macroGoals, { id: Date.now(), title, category: "Personal Growth", miniGoals: [] }]); }}>
                                    <div className="w-12 h-12 rounded-full border-3 border-tech-blue flex items-center justify-center text-2xl font-black bg-white mb-3 text-tech-blue">+</div>
                                    <h3 className="font-extrabold text-lg">New Macro Goal</h3>
                                </button>
                            </div>
                        )}

                        {/* PAGE: MOOD SPACE */}
                        {activePage === 'mood' && (
                            <div className="grid grid-cols-1 md:grid-cols-12 gap-8">
                                <div className="md:col-span-5 bg-white border-3 border-tech-blue p-6 rounded-3xl shadow-brutal">
                                    <h2 className="font-black text-2xl mb-6">Log Your Mood</h2>
                                    <div className="grid grid-cols-2 md:grid-cols-3 gap-4 mb-6">
                                        {[['Happy','😊'],['Calm','😌'],['Stressed','😫'],['Sad','🥺'],['Excited','🤩'],['Tired','😴']].map(([m, e]) => (
                                            <button key={m} onClick={() => addMood(m, e)} className="brutal-btn bg-paper border-3 border-tech-blue rounded-xl p-4 flex flex-col items-center hover:bg-yellow-50">
                                                <span className="text-3xl mb-2">{e}</span><span className="font-bold text-xs">{m}</span>
                                            </button>
                                        ))}
                                    </div>
                                    <textarea className="notebook-textarea border-3 border-tech-blue bg-paper rounded-xl p-4 w-full" placeholder="Add a note to your mood..." value={newMoodNote} onChange={e => setNewMoodNote(e.target.value)}></textarea>
                                </div>
                                <div className="md:col-span-7 flex flex-col gap-4">
                                    <h2 className="font-black text-2xl mb-2">Mood History</h2>
                                    {moods.map((m, i) => (
                                        <div key={i} className="bg-white border-3 border-tech-blue p-4 rounded-2xl shadow-brutal-sm flex gap-4 items-center">
                                            <div className="w-16 h-16 shrink-0 bg-sunflower border-3 border-tech-blue rounded-full flex items-center justify-center text-3xl">{m.emoji}</div>
                                            <div>
                                                <h3 className="font-extrabold text-lg">{m.mood}</h3>
                                                {m.note && <p className="font-bold opacity-80 text-sm mt-1">"{m.note}"</p>}
                                                <p className="text-xs font-black opacity-50 mt-2">{m.date}</p>
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        )}

                        {/* PAGE: MEMORY JOURNAL */}
                        {activePage === 'journal' && (
                            <div>
                                <div className="bg-white border-3 border-tech-blue p-6 rounded-3xl shadow-brutal mb-8 flex flex-col md:flex-row gap-4 md:items-center">
                                    <input type="text" placeholder="Image URL..." className="border-3 border-tech-blue bg-paper p-3 rounded-xl flex-1 font-bold outline-none" value={newMemoryUrl} onChange={e => setNewMemoryUrl(e.target.value)} />
                                    <input type="text" placeholder="Caption..." className="border-3 border-tech-blue bg-paper p-3 rounded-xl flex-1 font-bold outline-none" value={newMemoryCap} onChange={e => setNewMemoryCap(e.target.value)} />
                                    <button onClick={addMemory} className="brutal-btn bg-sunflower border-3 border-tech-blue p-3 px-6 rounded-xl font-black">Add Memory</button>
                                </div>
                                <div className="flex flex-wrap gap-6 md:gap-12 justify-center pt-8">
                                    {memories.map((mem, i) => (
                                        <div key={mem.id} className="polaroid w-full max-w-[250px]" style={{'--rand': Math.random()}} onClick={() => setSelectedMemory(mem)}>
                                            <img src={mem.url} alt="Memory" />
                                            <p className="mt-4 font-black text-lg text-center tracking-wide">{mem.caption}</p>
                                            <p className="text-center text-xs font-bold opacity-50 mt-1">{mem.date}</p>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        )}

                        {/* PAGE: SOUNDTRACK */}
                        {activePage === 'soundtrack' && (
                            <div>
                                {!isSpotifyConnected ? (
                                    <div className="bg-white border-3 border-tech-blue p-12 rounded-3xl shadow-brutal text-center flex flex-col items-center max-w-xl mx-auto">
                                        <span className="text-6xl mb-4">🎵</span>
                                        <h2 className="font-black text-2xl mb-4">Connect Soundtrack</h2>
                                        <p className="font-bold opacity-70 mb-8">Link your Spotify account to share playlists and sync live listening.</p>
                                        <button className="brutal-btn bg-sunflower border-3 border-tech-blue p-4 rounded-xl font-bold px-8 w-full" onClick={() => setIsSpotifyConnected(true)}>Connect Spotify</button>
                                    </div>
                                ) : (
                                    <div className="flex flex-col gap-8">
                                        <div className="flex justify-between items-center bg-white border-3 border-tech-blue p-4 rounded-2xl shadow-brutal-sm">
                                            <div className="flex items-center gap-3"><span className="text-2xl">🟢</span><h3 className="font-bold">Spotify Connected</h3></div>
                                            <button className="brutal-btn border-2 border-tech-blue bg-paper px-4 py-2 rounded-lg font-bold text-sm" onClick={() => setIsSpotifyConnected(false)}>Disconnect</button>
                                        </div>
                                        <div className="grid grid-cols-1 md:grid-cols-3 gap-8">
                                            <div className="bg-white border-3 border-tech-blue p-6 rounded-3xl shadow-brutal flex flex-col items-center text-center">
                                                <div className="w-32 h-32 rounded-full border-3 border-tech-blue bg-sunflower shadow-brutal overflow-hidden mb-4 animate-[spin_10s_linear_infinite]">
                                                    <img src="https://images.unsplash.com/photo-1614613535308-eb5fbd3d2c17?ixlib=rb-4.0.3&auto=format&fit=crop&w=300&q=80" className="w-full h-full object-cover opacity-80" />
                                                </div>
                                                <h3 className="font-extrabold text-2xl">Yellow</h3>
                                                <p className="font-bold opacity-70">Coldplay</p>
                                                <button className="brutal-btn bg-tech-blue text-white w-full border-3 border-tech-blue p-3 rounded-xl mt-6 font-black flex items-center justify-center gap-2" onClick={() => alert("Opening Spotify...")}><span className="text-lg">▶️</span> Play on Spotify</button>
                                            </div>
                                            <div className="bg-white border-3 border-tech-blue p-6 rounded-3xl shadow-brutal flex flex-col items-center text-center">
                                                <div className="w-32 h-32 rounded-full border-3 border-tech-blue bg-partner-blue shadow-brutal overflow-hidden mb-4 animate-[spin_10s_linear_infinite]">
                                                    <img src="https://images.unsplash.com/photo-1493225457124-a1a2a5fa3685?ixlib=rb-4.0.3&auto=format&fit=crop&w=300&q=80" className="w-full h-full object-cover opacity-80" />
                                                </div>
                                                <h3 className="font-extrabold text-2xl">Sweater Weather</h3>
                                                <p className="font-bold opacity-70">The Neighbourhood</p>
                                                <button className="brutal-btn bg-tech-blue text-white w-full border-3 border-tech-blue p-3 rounded-xl mt-6 font-black flex items-center justify-center gap-2" onClick={() => alert("Opening Spotify...")}><span className="text-lg">▶️</span> Play on Spotify</button>
                                            </div>
                                        </div>
                                    </div>
                                )}
                            </div>
                        )}

                        {/* PAGE: WELLNESS */}
                        {activePage === 'wellness' && (
                            <div className="grid grid-cols-1 md:grid-cols-2 gap-8">
                                <div className="bg-white border-3 border-tech-blue p-8 rounded-3xl shadow-brutal flex flex-col gap-2">
                                    <h3 className="font-black text-2xl flex items-center gap-3 mb-2"><span className="text-3xl">🌙</span> Sleep Cycle</h3>
                                    <div className="border-b-3 border-tech-blue border-dashed pb-4 mb-2">
                                        <p className="font-extrabold text-lg text-tech-blue">Partner slept 6.5h last night.</p>
                                    </div>
                                    <p className="font-bold opacity-80">Low energy expected today. Recommendation: Don't bring up heavy topics before dinner.</p>
                                </div>
                                <div className="bg-white border-3 border-tech-blue p-8 rounded-3xl shadow-brutal flex flex-col gap-2">
                                    <h3 className="font-black text-2xl flex items-center gap-3 mb-2"><span className="text-3xl">💧</span> Flo App</h3>
                                    <div className="border-b-3 border-tech-blue border-dashed pb-4 mb-2">
                                        <p className="font-extrabold text-lg text-tech-blue">Partner is in Luteal phase.</p>
                                    </div>
                                    <p className="font-bold opacity-80">Recommendation: Send chocolate and extra supportive messages.</p>
                                </div>
                            </div>
                        )}

                        {/* PAGE: GROWTH ARC */}
                        {activePage === 'growth' && (
                            <div className="bg-white border-3 border-tech-blue p-8 rounded-3xl shadow-brutal max-w-3xl mx-auto">
                                <h2 className="font-black text-3xl mb-8 border-b-3 border-tech-blue pb-4">Our Journey</h2>
                                <div className="border-l-3 border-tech-blue ml-4 pl-10 flex flex-col gap-10">
                                    <div className="relative">
                                        <div className="absolute -left-[43.5px] top-0 w-8 h-8 bg-sunflower border-3 border-tech-blue rounded-full shadow-brutal-sm"></div>
                                        <h3 className="font-black text-2xl">Chapter 1: The Meeting</h3>
                                        <p className="opacity-70 font-bold uppercase tracking-widest text-sm mb-2">August 2024</p>
                                        <p className="font-bold">The day we first met at the coffee shop in downtown.</p>
                                    </div>
                                    <div className="relative">
                                        <div className="absolute -left-[43.5px] top-0 w-8 h-8 bg-partner-blue border-3 border-tech-blue rounded-full shadow-brutal-sm"></div>
                                        <h3 className="font-black text-2xl">Chapter 2: The Distance</h3>
                                        <p className="opacity-70 font-bold uppercase tracking-widest text-sm mb-2">December 2024</p>
                                        <p className="font-bold">Moving 300 miles apart for the new job opportunity. Hard, but worth it.</p>
                                    </div>
                                </div>
                            </div>
                        )}

                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
