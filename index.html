<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anti-Gravity OS</title>
    
    <script type="module" src="/src/main.jsx"></script>
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'sunset-indigo': '#101524',
                        'sunset-violet': '#172033',
                        'sunset-orange': '#1d273d',
                        'sunset-yellow': '#23304c',
                        'brand-accent': '#f97316'
                    },
                    fontFamily: {
                        'sans': ['Inter', 'sans-serif'],
                        'serif': ['Inter', 'sans-serif']
                    }
                }
            }
        }
    </script>

    <style>
        body {
            font-family: 'Inter', sans-serif;
            color: #ffffff;
            margin: 0;
            overflow-x: hidden;
            /* Deep Apple Weather Night Sky Gradient */
            background: linear-gradient(
                to bottom,
                #070b14 0%,    
                #101726 30%,   
                #172033 70%,   
                #1d273d 100%   
            );
            background-attachment: fixed;
            min-height: 100vh;
        }

        /* Weather App Glass Panels */
        .glass-panel {
            background: rgba(30, 41, 59, 0.4); /* Deep slate tint */
            backdrop-filter: blur(40px);
            -webkit-backdrop-filter: blur(40px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 1.5rem;
            box-shadow: 0 4px 24px -1px rgba(0, 0, 0, 0.2);
            transition: all 0.3s ease;
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.04);
            border-radius: 1rem;
        }

        .glass-button {
            background: rgba(255, 255, 255, 0.06);
            border: 1px solid rgba(255, 255, 255, 0.06);
            transition: all 0.2s;
            border-radius: 9999px;
        }
        .glass-button:hover {
            background: rgba(255, 255, 255, 0.12);
        }
        .glass-button.active {
            background: #ffffff;
            color: #0f172a;
        }
        .glass-button.accent {
            background: rgba(255, 255, 255, 0.12);
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.15);
        }

        .glass-input {
            background: rgba(0, 0, 0, 0.15);
            border: 1px solid rgba(255, 255, 255, 0.08);
            color: white;
            outline: none;
            border-radius: 0.75rem;
            padding: 0.75rem 1rem;
            width: 100%;
        }
        .glass-input:focus {
            background: rgba(0, 0, 0, 0.25);
            border-color: rgba(255, 255, 255, 0.2);
        }

        /* Ambient Fog for Orbital Canvas */
        .ambient-fog {
            position: absolute;
            inset: 0;
            pointer-events: none;
            backdrop-filter: blur(var(--fog-density, 0px));
            transition: backdrop-filter 0.5s ease;
            z-index: 10;
        }

        /* Glowing Spheres Animation */
        .partner-sphere {
            position: absolute;
            border-radius: 50%;
            filter: blur(2px);
            transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            animation: pulse-glow 4s infinite alternate;
            z-index: 20;
        }
        @keyframes pulse-glow {
            0% { transform: scale(1); opacity: 0.85; }
            100% { transform: scale(1.05); opacity: 1; }
        }

        .sphere-a {
            background: radial-gradient(circle, #f97316 0%, rgba(249, 115, 22, 0.7) 60%, transparent 100%);
            box-shadow: 0 0 24px rgba(249, 115, 22, 0.5);
        }

        .sphere-b {
            background: radial-gradient(circle, #38bdf8 0%, rgba(56, 189, 248, 0.7) 60%, transparent 100%);
            box-shadow: 0 0 24px rgba(56, 189, 248, 0.5);
        }

        /* Grid Background for Orbital Canvas */
        .canvas-grid {
            background-image: 
                linear-gradient(rgba(255, 255, 255, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 255, 255, 0.03) 1px, transparent 1px);
            background-size: 20px 20px;
            background-color: rgba(0, 0, 0, 0.1);
        }

        /* Scrollbar */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(255, 255, 255, 0.15); border-radius: 3px; }

        /* Range Sliders */
        input[type=range] {
            -webkit-appearance: none;
            width: 100%;
            background: transparent;
        }
        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none;
            height: 16px;
            width: 16px;
            border-radius: 50%;
            background: #ffffff;
            cursor: pointer;
            box-shadow: 0 0 8px rgba(0,0,0,0.5);
            margin-top: -6px;
        }
        input[type=range]::-webkit-slider-runnable-track {
            width: 100%;
            height: 4px;
            cursor: pointer;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 2px;
        }
        
        /* Growth Arc Timeline line */
        .timeline-line {
            position: absolute;
            left: 24px;
            top: 24px;
            bottom: 0;
            width: 2px;
            background: rgba(255, 255, 255, 0.1);
            z-index: 0;
        }
    </style>
</head>
<body>
    <div id="root"></div>
</body>
</html>
