<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stationery Hollistic Wheel & Tracker</title>
    
    <!-- React & ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
    
    <!-- Babel for JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">

    <!-- Tailwind Config & Custom CSS -->
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'paper': '#F9F8F6',
                        'sunflower': '#FFD700',
                        'tech-blue': '#1E3A8A',
                        'partner-blue': '#93C5FD'
                    },
                    fontFamily: {
                        'nunito': ['Nunito', 'sans-serif'],
                    },
                    boxShadow: {
                        'brutal': '6px 6px 0px 0px #1E3A8A',
                        'brutal-sm': '3px 3px 0px 0px #1E3A8A',
                        'brutal-active': '1px 1px 0px 0px #1E3A8A',
                    },
                    borderWidth: {
                        '3': '3px',
                    }
                }
            }
        }
    </script>

    <style>
        body {
            font-family: 'Nunito', sans-serif;
            background-color: #F9F8F6;
            color: #1E3A8A;
            margin: 0;
            overflow-x: hidden;
        }

        /* Dot Grid Overlay */
        .dot-grid {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background-image: radial-gradient(rgba(30, 58, 138, 0.15) 1.5px, transparent 1.5px);
            background-size: 24px 24px;
            z-index: -1;
            pointer-events: none;
        }

        /* Tactile Button Spring Physics */
        .brutal-btn {
            transition: all 0.1s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .brutal-btn:active {
            transform: translate(3px, 3px);
            box-shadow: 1px 1px 0px 0px #1E3A8A;
        }

        /* Notebook Styling */
        .notebook-textarea {
            background-color: transparent;
            background-image: repeating-linear-gradient(transparent, transparent 31px, rgba(30, 58, 138, 0.2) 32px);
            line-height: 32px;
            padding-top: 6px;
            border: none;
            resize: vertical;
            outline: none;
            font-family: 'Nunito', sans-serif;
            font-weight: 600;
            color: #1E3A8A;
            width: 100%;
        }
        textarea.notebook-textarea { min-height: 150px; }

        /* Custom Range Slider */
        input[type=range] {
            -webkit-appearance: none;
            width: 100%;
            background: transparent;
        }
        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none;
            height: 20px;
            width: 20px;
            border-radius: 50%;
            background: #FFD700;
            cursor: pointer;
            border: 3px solid #1E3A8A;
            margin-top: -8px;
            box-shadow: 2px 2px 0px 0px #1E3A8A;
        }
        input[type=range].partner-slider::-webkit-slider-thumb {
            background: #93C5FD;
        }
        input[type=range]::-webkit-slider-runnable-track {
            width: 100%;
            height: 6px;
            cursor: pointer;
            background: rgba(30, 58, 138, 0.1);
            border-radius: 3px;
            border: 1px solid #1E3A8A;
        }

        /* Monoline Checkbox */
        .monoline-checkbox {
            width: 24px;
            height: 24px;
            border: 3px solid #1E3A8A;
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            background: #fff;
            transition: all 0.1s ease-in-out;
            box-shadow: 2px 2px 0px 0px #1E3A8A;
        }
        .monoline-checkbox.checked {
            background: #FFD700;
            box-shadow: 1px 1px 0px 0px #1E3A8A;
            transform: translate(1px, 1px);
        }
        .monoline-checkbox.checked::after {
            content: "X";
            color: #1E3A8A;
            font-weight: 900;
            font-size: 16px;
            line-height: 1;
        }

        /* Animations */
        @keyframes flyAirplane {
            0% { transform: translate(0, 0) rotate(0deg) scale(1); opacity: 1; }
            50% { transform: translate(150px, -100px) rotate(15deg) scale(1.2); opacity: 1; }
            100% { transform: translate(300px, -200px) rotate(30deg) scale(0.5); opacity: 0; }
        }
        .fly-animation { animation: flyAirplane 1.5s ease-out forwards; }
        
        @keyframes sweatDrop {
            0% { transform: translateY(0) scale(0); opacity: 0; }
            50% { transform: translateY(10px) scale(1); opacity: 1; }
            100% { transform: translateY(20px) scale(0.5); opacity: 0; }
        }
        .sweat-animation { animation: sweatDrop 1s ease-in forwards; }

        @keyframes burstStar {
            0% { transform: scale(0) rotate(0deg); opacity: 1; }
            50% { transform: scale(1.5) rotate(45deg); opacity: 1; }
            100% { transform: scale(2) rotate(90deg); opacity: 0; }
        }
        .burst-animation { animation: burstStar 0.5s ease-out forwards; }

        @keyframes shootConfetti {
            0% { transform: translateY(0) scale(1) rotate(0deg); opacity: 1; }
            100% { transform: translate(var(--tx), var(--ty)) scale(0.5) rotate(720deg); opacity: 0; }
        }
        .confetti-particle {
            animation: shootConfetti 1.2s ease-out forwards;
        }
    </style>
</head>
<body>
    <div class="dot-grid"></div>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const CATEGORIES = [
            'Finances', 'Career & Projects', 'Health & Wellness', 
            'Spirituality', 'Personal Growth', 'Romance'
        ];

        // --- MATH UTILS FOR RADAR CHART ---
        const polarToCartesian = (centerX, centerY, radius, angleInDegrees) => {
            const angleInRadians = (angleInDegrees - 90) * Math.PI / 180.0;
            return {
                x: centerX + (radius * Math.cos(angleInRadians)),
                y: centerY + (radius * Math.sin(angleInRadians))
            };
        };

        const RadarChart = ({ userScores, partnerScores }) => {
            const size = 300;
            const center = size / 2;
            const maxRadius = 100;
            const numAxes = CATEGORIES.length;
            const angleStep = 360 / numAxes;

            const getPoints = (scores) => {
                return scores.map((score, i) => {
                    const radius = (score / 10) * maxRadius;
                    const pos = polarToCartesian(center, center, radius, i * angleStep);
                    return `${pos.x},${pos.y}`;
                }).join(' ');
            };

            const gridRings = [0.2, 0.4, 0.6, 0.8, 1].map((scale, index) => {
                const radius = maxRadius * scale;
                const points = Array.from({length: numAxes}).map((_, i) => {
                    const pos = polarToCartesian(center, center, radius, i * angleStep);
                    return `${pos.x},${pos.y}`;
                }).join(' ');
                return (
                    <polygon 
                        key={index} points={points} fill="none" 
                        stroke="#1E3A8A" strokeWidth={scale === 1 ? "3" : "1"} 
                        strokeDasharray={scale === 1 ? "none" : "4 4"} className="opacity-50"
                    />
                );
            });

            const axes = CATEGORIES.map((cat, i) => {
                const outer = polarToCartesian(center, center, maxRadius, i * angleStep);
                const labelPos = polarToCartesian(center, center, maxRadius + 25, i * angleStep);
                return (
                    <g key={i}>
                        <line x1={center} y1={center} x2={outer.x} y2={outer.y} stroke="#1E3A8A" strokeWidth="2" strokeDasharray="4 4" className="opacity-40" />
                        <text x={labelPos.x} y={labelPos.y} textAnchor="middle" alignmentBaseline="middle" className="text-xs font-bold fill-tech-blue">
                            {cat}
                        </text>
                    </g>
                );
            });

            return (
                <div className="relative w-full max-w-sm mx-auto p-4 bg-white border-3 border-tech-blue rounded-3xl shadow-brutal">
                    <svg viewBox={`0 0 ${size} ${size}`} className="w-full h-auto overflow-visible">
                        {gridRings}
                        {axes}
                        <polygon points={getPoints(partnerScores)} fill="rgba(147, 197, 253, 0.6)" stroke="#1E3A8A" strokeWidth="3" strokeLinejoin="round" />
                        <polygon points={getPoints(userScores)} fill="rgba(255, 215, 0, 0.7)" stroke="#1E3A8A" strokeWidth="3" strokeLinejoin="round" />
                    </svg>
                    
                    <div className="absolute top-4 left-4 flex items-center gap-2">
                        <div className="w-3 h-3 rounded-full bg-sunflower border-2 border-tech-blue"></div>
                        <span className="text-xs font-bold">You</span>
                    </div>
                    <div className="absolute top-4 right-4 flex items-center gap-2">
                        <span className="text-xs font-bold">Partner</span>
                        <div className="w-3 h-3 rounded-full bg-partner-blue border-2 border-tech-blue"></div>
                    </div>
                </div>
            );
        };

        const ConfettiOverlay = () => {
            return (
                <div className="absolute inset-0 overflow-hidden rounded-3xl pointer-events-none z-50 flex items-end justify-center pb-10">
                    {Array.from({length: 15}).map((_, i) => (
                        <div 
                            key={i} 
                            className="absolute w-4 h-4 confetti-particle border-2 border-tech-blue"
                            style={{
                                backgroundColor: i % 2 === 0 ? '#FFD700' : '#93C5FD',
                                left: `50%`,
                                bottom: '20px',
                                animationDelay: `${Math.random() * 0.1}s`,
                                '--tx': `${-100 + Math.random() * 200}px`,
                                '--ty': `${-150 - Math.random() * 150}px`,
                                borderRadius: Math.random() > 0.5 ? '50%' : '0'
                            }}
                        ></div>
                    ))}
                </div>
            );
        };

        const GoalCard = ({ goal, onToggleMini, onAddMini }) => {
            const [newMiniText, setNewMiniText] = useState("");
            const [animatingMiniId, setAnimatingMiniId] = useState(null);
            const [showConfetti, setShowConfetti] = useState(false);

            const completedCount = goal.miniGoals.filter(m => m.completed).length;
            const progress = goal.miniGoals.length === 0 ? 0 : (completedCount / goal.miniGoals.length) * 100;

            const handleToggle = (miniId, wasCompleted) => {
                onToggleMini(goal.id, miniId);
                if (!wasCompleted) {
                    setAnimatingMiniId(miniId);
                    setTimeout(() => setAnimatingMiniId(null), 500);
                    
                    if (completedCount + 1 === goal.miniGoals.length && goal.miniGoals.length > 0) {
                        setShowConfetti(true);
                        setTimeout(() => setShowConfetti(false), 2000);
                    }
                }
            };

            const handleAdd = (e) => {
                if(e.key === 'Enter' && newMiniText.trim()) {
                    onAddMini(goal.id, newMiniText);
                    setNewMiniText("");
                }
            }

            return (
                <div className="bg-white border-3 border-tech-blue p-5 rounded-3xl shadow-brutal relative flex flex-col gap-4">
                    {showConfetti && <ConfettiOverlay />}
                    
                    <div className="flex justify-between items-start">
                        <span className="text-xs font-black uppercase tracking-widest bg-sunflower border-2 border-tech-blue px-3 py-1 rounded-full shadow-brutal-active">
                            {goal.category}
                        </span>
                    </div>
                    <h3 className="text-xl font-extrabold">{goal.title}</h3>
                    
                    <div className="w-full h-4 rounded-full border-3 border-tech-blue overflow-hidden bg-paper">
                        <div className="h-full bg-tech-blue transition-all duration-500 ease-out" style={{width: `${progress}%`}}></div>
                    </div>

                    <div className="flex flex-col gap-3 mt-2">
                        {goal.miniGoals.map(mini => (
                            <div key={mini.id} className="flex items-center gap-3 relative">
                                {animatingMiniId === mini.id && (
                                    <div className="absolute -left-3 text-2xl burst-animation pointer-events-none z-10">✨</div>
                                )}
                                <button 
                                    className={`monoline-checkbox shrink-0 ${mini.completed ? 'checked' : ''}`}
                                    onClick={() => handleToggle(mini.id, mini.completed)}
                                ></button>
                                <span className={`font-bold leading-tight ${mini.completed ? 'line-through opacity-50' : ''}`}>
                                    {mini.text}
                                </span>
                            </div>
                        ))}
                    </div>

                    <input 
                        type="text" 
                        placeholder="+ Add mini-goal (Press Enter)..." 
                        className="notebook-textarea min-h-0 h-10 mt-2 px-1 text-sm bg-transparent"
                        value={newMiniText}
                        onChange={e => setNewMiniText(e.target.value)}
                        onKeyDown={handleAdd}
                    />
                </div>
            );
        };

        const Sidebar = ({ activePage, setActivePage }) => {
            const navItems = [
                { id: 'dashboard', icon: 'pie-chart', label: 'Holistic Wheel' },
                { id: 'goals', icon: 'check-square', label: 'Goal Tracker' },
                { id: 'mood', icon: 'smile', label: 'Mood Space' },
                { id: 'journal', icon: 'book-image', label: 'Memory Journal' },
                { id: 'soundtrack', icon: 'music', label: 'Soundtrack' }
            ];

            return (
                <aside className="w-64 fixed top-0 left-0 h-screen bg-white border-r-3 border-tech-blue p-6 flex flex-col gap-8 z-50">
                    <div className="flex items-center gap-3 border-b-3 border-tech-blue pb-6 mt-4">
                        <div className="w-10 h-10 bg-sunflower border-3 border-tech-blue rounded-lg shadow-brutal-active flex items-center justify-center shrink-0">
                            <i data-lucide="sun" className="w-6 h-6"></i>
                        </div>
                        <h1 className="font-black text-2xl tracking-widest">LUMINA</h1>
                    </div>
                    
                    <nav className="flex flex-col gap-4">
                        {navItems.map(item => (
                            <button 
                                key={item.id}
                                onClick={() => setActivePage(item.id)}
                                className={`brutal-btn flex items-center gap-3 p-3 rounded-xl border-3 border-tech-blue font-bold transition-all text-left ${activePage === item.id ? 'bg-sunflower shadow-brutal-sm translate-x-1' : 'bg-paper hover:bg-yellow-50'}`}
                            >
                                <i data-lucide={item.icon} className="w-5 h-5 shrink-0"></i>
                                {item.label}
                            </button>
                        ))}
                    </nav>
                </aside>
            );
        };

        const App = () => {
            const [activePage, setActivePage] = useState('dashboard');
            
            const [userScores, setUserScores] = useState([7, 6, 8, 5, 7, 9]);
            const [partnerScores, setPartnerScores] = useState([6, 8, 7, 4, 8, 9]);
            const [isAnimating, setIsAnimating] = useState(false);

            const [macroGoals, setMacroGoals] = useState([
                {
                    id: 1, title: "Plan Anniversary Trip", category: "Romance",
                    miniGoals: [ {id: 101, text: "Book flights to Kyoto", completed: false}, {id: 102, text: "Reserve ryokan", completed: true} ]
                },
                {
                    id: 2, title: "Build Emergency Fund", category: "Finances",
                    miniGoals: [ {id: 201, text: "Save first $1000", completed: true}, {id: 202, text: "Automate transfers", completed: false} ]
                },
                {
                    id: 3, title: "Daily Wellness", category: "Health & Wellness",
                    miniGoals: [ {id: 301, text: "Morning stretches", completed: true}, {id: 302, text: "Drink 2L water", completed: true} ]
                }
            ]);

            useEffect(() => {
                lucide.createIcons();
            }, [activePage]);

            const combinedScores = userScores.map((s, i) => s + partnerScores[i]);
            const minScoreIndex = combinedScores.indexOf(Math.min(...combinedScores));
            const focusCategory = CATEGORIES[minScoreIndex];

            const handleGoalClick = () => {
                setIsAnimating(true);
                setTimeout(() => setIsAnimating(false), 1500);
            };

            const toggleMiniGoal = (macroId, miniId) => {
                setMacroGoals(prev => prev.map(g => {
                    if(g.id === macroId) {
                        return {...g, miniGoals: g.miniGoals.map(m => m.id === miniId ? {...m, completed: !m.completed} : m)};
                    }
                    return g;
                }));
            };

            const addMiniGoal = (macroId, text) => {
                setMacroGoals(prev => prev.map(g => {
                    if(g.id === macroId) {
                        return {...g, miniGoals: [...g.miniGoals, {id: Date.now(), text, completed: false}]};
                    }
                    return g;
                }));
            };

            const addNewMacroGoal = () => {
                const title = prompt("Enter new Macro Goal title:");
                if(title) {
                    setMacroGoals([...macroGoals, {
                        id: Date.now(), title, category: "Personal Growth", miniGoals: []
                    }]);
                }
            };

            return (
                <div className="min-h-screen pl-64 relative pb-20">
                    <Sidebar activePage={activePage} setActivePage={setActivePage} />
                    
                    <div className="max-w-6xl mx-auto p-4 md:p-8">
                        {/* Global Header */}
                        <header className="flex justify-between items-center mb-8 bg-white border-3 border-tech-blue p-4 rounded-2xl shadow-brutal">
                            <div className="flex items-center gap-3">
                                <div className="w-12 h-12 rounded-full bg-sunflower border-3 border-tech-blue flex items-center justify-center shadow-brutal-sm relative">
                                    <span className="text-2xl">🌻</span>
                                </div>
                                <div>
                                    <h2 className="font-extrabold text-xl leading-tight">Your Journey</h2>
                                    <p className="text-xs font-bold opacity-70">Chapter 4</p>
                                </div>
                            </div>

                            <h1 className="font-black text-2xl md:text-3xl tracking-wide hidden md:block">
                                {activePage === 'dashboard' ? 'HOLISTIC WHEEL' : activePage.toUpperCase()}
                            </h1>

                            <div className="flex items-center gap-3 text-right">
                                <div>
                                    <h2 className="font-extrabold text-xl leading-tight">Partner</h2>
                                    <p className="text-xs font-bold opacity-70">Sync: 85%</p>
                                </div>
                                <div className="w-12 h-12 rounded-full bg-partner-blue border-3 border-tech-blue flex items-center justify-center shadow-brutal-sm relative">
                                    <span className="text-2xl">🎧</span>
                                    {isAnimating && <div className="absolute -top-4 -right-2 text-xl sweat-animation">💦</div>}
                                </div>
                            </div>
                        </header>

                        {/* Page 1: Dashboard / Holistic Wheel */}
                        {activePage === 'dashboard' && (
                            <div className="grid grid-cols-1 lg:grid-cols-12 gap-8 mb-16">
                                <div className="lg:col-span-4 bg-white border-3 border-tech-blue p-6 rounded-3xl shadow-brutal flex flex-col gap-6">
                                    <div className="flex items-center gap-2 mb-2">
                                        <i data-lucide="sliders" className="w-6 h-6"></i>
                                        <h2 className="font-extrabold text-xl">Adjust Balance</h2>
                                    </div>
                                    <div className="overflow-y-auto pr-2" style={{maxHeight: '500px'}}>
                                        {CATEGORIES.map((cat, i) => (
                                            <div key={i} className="mb-6 pb-6 border-b-2 border-tech-blue border-dashed last:border-0 last:pb-0">
                                                <h3 className="font-bold text-sm mb-3">{cat}</h3>
                                                <div className="flex items-center gap-4 mb-3">
                                                    <div className="w-8 h-8 rounded-full bg-sunflower border-2 border-tech-blue flex items-center justify-center font-bold text-xs shadow-brutal-active shrink-0">{userScores[i]}</div>
                                                    <input type="range" min="1" max="10" value={userScores[i]} onChange={e => { const newScores = [...userScores]; newScores[i] = parseInt(e.target.value); setUserScores(newScores); }} />
                                                </div>
                                                <div className="flex items-center gap-4">
                                                    <div className="w-8 h-8 rounded-full bg-partner-blue border-2 border-tech-blue flex items-center justify-center font-bold text-xs shadow-brutal-active shrink-0">{partnerScores[i]}</div>
                                                    <input type="range" min="1" max="10" className="partner-slider" value={partnerScores[i]} onChange={e => { const newScores = [...partnerScores]; newScores[i] = parseInt(e.target.value); setPartnerScores(newScores); }} />
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                </div>

                                <div className="lg:col-span-8 flex flex-col gap-8">
                                    <RadarChart userScores={userScores} partnerScores={partnerScores} />
                                    <div className="relative">
                                        {isAnimating && <div className="absolute top-1/2 left-1/2 z-50 text-4xl fly-animation pointer-events-none">✈️</div>}
                                        <button onClick={handleGoalClick} className="brutal-btn w-full bg-sunflower border-3 border-tech-blue rounded-2xl shadow-brutal p-6 flex flex-col items-center justify-center text-center cursor-pointer relative overflow-hidden">
                                            <span className="text-sm font-extrabold uppercase tracking-widest opacity-80 mb-1">Recommended Action</span>
                                            <h3 className="text-2xl font-black">Plan a {focusCategory} Activity</h3>
                                            <p className="font-bold text-sm mt-2 opacity-90">This area has the lowest combined score. Time for teamwork!</p>
                                        </button>
                                    </div>
                                    <div className="bg-white border-3 border-tech-blue rounded-3xl shadow-brutal overflow-hidden">
                                        <div className="border-b-3 border-tech-blue p-4 bg-paper flex items-center gap-2">
                                            <i data-lucide="book-open" className="w-5 h-5"></i>
                                            <h2 className="font-extrabold text-lg">The Crucible (Reflections)</h2>
                                        </div>
                                        <div className="grid grid-cols-1 md:grid-cols-2 divide-y-3 md:divide-y-0 md:divide-x-3 divide-tech-blue">
                                            <div className="p-6 bg-yellow-50/30">
                                                <div className="flex items-center gap-2 mb-4"><div className="w-6 h-6 rounded-full bg-sunflower border-2 border-tech-blue"></div><span className="font-bold">Your Notes</span></div>
                                                <textarea className="notebook-textarea" placeholder="Write your reflections here..." defaultValue="I think we should focus more on saving for our next trip to Tokyo."></textarea>
                                            </div>
                                            <div className="p-6 bg-blue-50/30">
                                                <div className="flex items-center gap-2 mb-4"><div className="w-6 h-6 rounded-full bg-partner-blue border-2 border-tech-blue"></div><span className="font-bold">Partner's Notes</span></div>
                                                <textarea className="notebook-textarea" placeholder="Partner's reflections..." defaultValue="Agreed! Though I'm feeling a bit burnt out with work."></textarea>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        )}

                        {/* Page 2: Goal Tracker */}
                        {activePage === 'goals' && (
                            <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
                                {macroGoals.map(goal => (
                                    <GoalCard key={goal.id} goal={goal} onToggleMini={toggleMiniGoal} onAddMini={addMiniGoal} />
                                ))}
                                <button className="brutal-btn bg-paper border-3 border-tech-blue border-dashed p-5 rounded-3xl shadow-brutal flex flex-col items-center justify-center cursor-pointer opacity-80 hover:opacity-100 min-h-[200px]" onClick={addNewMacroGoal}>
                                    <div className="w-12 h-12 rounded-full border-3 border-tech-blue flex items-center justify-center text-2xl font-black bg-white mb-3 text-tech-blue">+</div>
                                    <h3 className="font-extrabold text-lg">New Macro Goal</h3>
                                </button>
                            </div>
                        )}

                        {/* Other Pages Stub */}
                        {(activePage === 'mood' || activePage === 'journal' || activePage === 'soundtrack') && (
                            <div className="bg-white border-3 border-tech-blue p-12 rounded-3xl shadow-brutal text-center flex flex-col items-center justify-center min-h-[400px]">
                                <i data-lucide="hammer" className="w-16 h-16 mb-6 text-tech-blue opacity-50"></i>
                                <h2 className="text-3xl font-black mb-2 uppercase">Under Construction</h2>
                                <p className="font-bold opacity-80 max-w-md mx-auto">The {activePage} page is currently being rebuilt into the Japanese Stationery design system. Please check back later!</p>
                            </div>
                        )}

                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
